name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: turn-mcp-web-universal/package-lock.json

      - name: Install dependencies
        working-directory: turn-mcp-web-universal
        run: npm ci

      - name: Build (TypeScript)
        working-directory: turn-mcp-web-universal
        run: npm run build

      - name: Run tests
        working-directory: turn-mcp-web-universal
        run: npm test
        timeout-minutes: 5
