services:
  turn-mcp-web:
    build: .
    image: turn-mcp-web-universal:latest
    container_name: turn-mcp-web-universal
    restart: unless-stopped
    ports:
      - "3737:3737"
    environment:
      TURN_MCP_HTTP_HOST: "0.0.0.0"
      TURN_MCP_HTTP_PORT: "3737"
      TURN_MCP_HTTP_PATH: "/mcp"
      TURN_MCP_REQUIRE_API_KEY: "true"
      TURN_MCP_API_KEY: "replace_me_operator_key"
      TURN_MCP_VIEWER_API_KEY: "replace_me_viewer_key"
      TURN_MCP_EVENT_LOG_FILE: "/app/logs/events.jsonl"
      TURN_MCP_HISTORY_FILE: "/app/logs/history.jsonl"
      # TURN_MCP_WEBHOOK_URL: "https://example.com/webhook"
      # TURN_MCP_WEBHOOK_EVENTS: "wait_created"
    volumes:
      - ./logs:/app/logs
